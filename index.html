<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通勤日报 — AI 每日新闻播客</title>
<style>
  :root { --bg:#0f0f0f; --card:#1a1a1a; --accent:#4f9cf9; --text:#e0e0e0; --muted:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; padding:2rem 1rem; }
  h1 { font-size:1.6rem; margin-bottom:.3rem; }
  .sub { color:var(--muted); font-size:.9rem; margin-bottom:2rem; }
  .ep { background:var(--card); border-radius:12px; padding:1.2rem 1.4rem; margin-bottom:1rem; }
  .ep-title { font-weight:600; margin-bottom:.5rem; }
  .ep-meta { color:var(--muted); font-size:.82rem; margin-bottom:.8rem; }
  audio { width:100%; accent-color:var(--accent); }
  .rss { display:inline-block; margin-top:2rem; color:var(--accent); font-size:.85rem; }
</style>
</head>
<body>
<h1>通勤日报</h1>
<p class="sub">AI 精选每日中文新闻播客，适合通勤收听</p>
<div id="episodes"></div>
<a class="rss" href="feed.xml">📡 RSS / Podcast Feed</a>

<script>
async function load() {
  const res = await fetch('feed.xml');
  const txt = await res.text();
  const xml = new DOMParser().parseFromString(txt, 'application/xml');
  const items = xml.querySelectorAll('item');
  const container = document.getElementById('episodes');
  items.forEach(item => {
    const title = item.querySelector('title')?.textContent ?? '';
    const enclosure = item.querySelector('enclosure');
    const url = enclosure?.getAttribute('url') ?? '';
    const duration = item.querySelector('duration')?.textContent ?? '';
    const pubDate = item.querySelector('pubDate')?.textContent ?? '';
    const date = pubDate ? new Date(pubDate).toLocaleDateString('zh-CN') : '';
    const div = document.createElement('div');
    div.className = 'ep';
    div.innerHTML = `
      <div class="ep-title">${title}</div>
      <div class="ep-meta">${date}${duration ? ' · ' + duration : ''}</div>
      <audio controls src="${url}"></audio>`;
    container.appendChild(div);
  });
}
load();
</script>
</body>
</html>
